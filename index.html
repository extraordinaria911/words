<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초등 영어단어 앱 v16 수정본</title>
<style>
:root{
  --bg:#f6f8fc; --card:#ffffff; --ink:#1f2937; --sub:#6b7280; --line:#dbe2ea;
  --blue:#2563eb; --blue-soft:#dbeafe; --red:#b91c1c; --red-soft:#fee2e2;
  --green:#15803d; --accent:#0f766e; --yellow:#fef3c7;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;}
header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);}
main{max-width:1000px;margin:0 auto;padding:16px;}
h1{margin:0 0 10px 0;font-size:20px;}
h2{margin:0 0 12px 0;font-size:18px;}
.tabs{display:flex;flex-wrap:wrap;gap:8px;}
.tab{background:#fff;border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:999px;font-weight:700;cursor:pointer;}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:14px 0;box-shadow:0 1px 2px rgba(15,23,42,.04);}
textarea,input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:15px;background:#fff;color:var(--ink);}
textarea{min-height:150px;resize:vertical;}
button{border:0;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer;}
.btn{background:var(--blue);color:#fff;}
.btn2{background:#e5e7eb;color:#111827;}
.btn3{background:var(--red-soft);color:var(--red);}
.btn4{background:var(--yellow);color:#78350f;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row > *{flex:1 1 auto}
.small{font-size:13px;color:var(--sub);}
.example{font-size:19px;font-weight:800;color:#111827;margin:8px 0;line-height:1.6;}
.meaning{font-size:17px;margin:8px 0;line-height:1.6;}
.word{font-size:24px;font-weight:900;color:var(--green);margin:8px 0 6px 0;}
.numcirc{font-size:19px;font-weight:700;color:#374151;margin-right:8px;}
.correct{color:var(--blue);font-weight:900}
.wrong{color:var(--red);font-weight:900}
.choice{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);margin:8px 0;padding:12px;border-radius:12px;color:var(--ink);}
.choice.correctChoice{border-color:var(--blue);background:var(--blue-soft);}
.choice.wrongChoice{border-color:var(--red);background:var(--red-soft);}
.hidden{display:none}
.progress{font-size:14px;color:var(--sub);font-weight:700}
mark{background:#dcfce7;color:#166534;border-radius:6px;padding:0 3px;font-weight:900}
.word-img-wrap{width:100%;display:flex;justify-content:center;margin:10px 0 14px 0;}
.word-img{max-width:100%;max-height:220px;object-fit:contain;border-radius:14px;background:#f1f5f9;border:1px solid var(--line);}
.list-img{width:72px;height:72px;object-fit:contain;border-radius:10px;background:#f1f5f9;border:1px solid var(--line);flex:0 0 auto;}
.item-row{display:flex;gap:12px;align-items:flex-start;}
.url{font-size:11px;color:#94a3b8;word-break:break-all;}
.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:12px;padding:12px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <main>
    <h1>초등 영어단어 앱 v16 수정본</h1>
    <div class="tabs">
      <button class="tab active" data-tab="learn">학습모드</button>
      <button class="tab" data-tab="quiz">뜻을 읽고 단어 맞히기</button>
      <button class="tab" data-tab="wrong">오답노트</button>
      <button class="tab" data-tab="use">활용하기</button>
      <button class="tab" data-tab="input">입력/파일</button>
      <button class="tab" data-tab="all">전체 내용</button>
    </div>
  </main>
</header>

<main>
  <section id="learn" class="panel active">
    <div class="card">
      <div class="row">
        <button class="btn2" onclick="prevCard()">이전</button>
        <div class="progress" id="learnProgress">0 / 0</div>
        <button class="btn" onclick="nextCard()">다음</button>
      </div>
    </div>
    <div class="card" id="learnCard">입력/파일에서 단어를 넣어 주세요.</div>
  </section>

  <section id="quiz" class="panel">
    <div class="card">
      <button class="btn" onclick="makeQuiz()">새 문제 만들기</button>
    </div>
    <div class="card" id="quizBox">단어를 4개 이상 입력하면 문제가 나옵니다.</div>
  </section>

  <section id="wrong" class="panel">
    <div class="card">
      <button class="btn3" onclick="clearWrong()">오답노트 지우기</button>
    </div>
    <div id="wrongList" class="card">아직 오답이 없습니다.</div>
  </section>

  <section id="use" class="panel">
    <div class="card">
      <h2>활용하기</h2>
      <p class="small">예문을 보고 단어를 직접 써 보세요.</p>
      <div id="useBox"></div>
    </div>
  </section>

  <section id="input" class="panel">
    <div class="card">
      <h2>입력/파일</h2>
      <p class="notice">
        입력 형식: <b>단어 / 예문 / 뜻 / 이미지주소</b><br/>
        한 줄에 하나씩 넣으세요. 구분자는 <b>탭</b>, <b>|</b>, <b>쉼표</b>를 사용할 수 있습니다.
      </p>

      <div class="row" style="margin:12px 0;">
        <input type="file" id="fileInput" accept=".txt,.csv,.html" />
      </div>

      <textarea id="rawInput" placeholder="apple&#9;I eat an apple.&#9;a fruit&#9;https://example.com/apple.jpg"></textarea>

      <div class="row" style="margin-top:10px;">
        <button class="btn" onclick="applyInput()">입력 내용 반영</button>
        <button class="btn4" onclick="clearInputOnly()">입력창 지우기</button>
        <button class="btn3" onclick="clearAll()">전체 지우기</button>
      </div>
    </div>
  </section>

  <section id="all" class="panel">
    <div class="card">
      <h2>전체 내용</h2>
      <div id="allList">아직 반영된 단어가 없습니다.</div>
    </div>
  </section>
</main>

<script>
let words = [];
let wrongWords = [];
let currentIndex = 0;
let currentQuiz = null;

const sample = [
  ["apple", "I eat an apple.", "a fruit", "https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"],
  ["dog", "The dog runs.", "an animal", "https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg"],
  ["book", "I read a book.", "many pages to read", "https://upload.wikimedia.org/wikipedia/commons/8/89/Tom_Sawyer_1876_frontispiece.jpg"],
  ["sun", "The sun is hot.", "a bright star", "https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_disk.jpg"]
];

function init(){
  const saved = localStorage.getItem("v16_words_fixed");
  const savedWrong = localStorage.getItem("v16_wrong_fixed");

  if(saved){
    try{ words = JSON.parse(saved) || []; }catch(e){ words = []; }
  }

  if(savedWrong){
    try{ wrongWords = JSON.parse(savedWrong) || []; }catch(e){ wrongWords = []; }
  }

  if(words.length === 0){
    words = sample.map(([word, sentence, meaning, imageUrl]) => ({word, sentence, meaning, imageUrl}));
    saveWords();
  }

  renderAll();
}

function saveWords(){
  localStorage.setItem("v16_words_fixed", JSON.stringify(words));
}

function saveWrong(){
  localStorage.setItem("v16_wrong_fixed", JSON.stringify(wrongWords));
}

function parseText(text){
  const lines = text.split(/\r?\n/).map(v => v.trim()).filter(Boolean);
  const parsed = [];

  for(const line of lines){
    let parts;
    if(line.includes("\t")){
      parts = line.split("\t");
    }else if(line.includes("|")){
      parts = line.split("|");
    }else{
      parts = splitCsvSimple(line);
    }

    parts = parts.map(v => (v || "").trim());
    const word = parts[0] || "";
    const sentence = parts[1] || "";
    const meaning = parts[2] || "";
    const imageUrl = parts[3] || "";

    if(word || sentence || meaning || imageUrl){
      parsed.push({word, sentence, meaning, imageUrl});
    }
  }

  return parsed;
}

function splitCsvSimple(line){
  const result = [];
  let cur = "";
  let inQuotes = false;

  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(ch === '"'){
      inQuotes = !inQuotes;
    }else if(ch === "," && !inQuotes){
      result.push(cur);
      cur = "";
    }else{
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function applyInput(){
  const text = document.getElementById("rawInput").value;
  const parsed = parseText(text);

  words = parsed;
  currentIndex = 0;
  saveWords();
  renderAll();
  openTab("learn");
}

function clearInputOnly(){
  document.getElementById("rawInput").value = "";
}

function clearAll(){
  document.getElementById("rawInput").value = "";
  words = [];
  wrongWords = [];
  currentIndex = 0;
  currentQuiz = null;
  saveWords();
  saveWrong();
  renderAll();
}

document.getElementById("fileInput").addEventListener("change", async function(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  const text = await file.text();
  document.getElementById("rawInput").value = text;

  const parsed = parseText(text);
  words = parsed;
  currentIndex = 0;

  saveWords();
  renderAll();
  openTab("learn");

  e.target.value = "";
});

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function highlight(sentence, word){
  sentence = escapeHtml(sentence);
  word = String(word || "").trim();
  if(!word) return sentence;

  const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("(" + safeWord + ")", "gi");
  return sentence.replace(re, "<mark>$1</mark>");
}

function renderLearn(){
  const box = document.getElementById("learnCard");
  const progress = document.getElementById("learnProgress");

  if(!words.length){
    progress.textContent = "0 / 0";
    box.innerHTML = "입력/파일에서 단어를 넣어 주세요.";
    return;
  }

  if(currentIndex >= words.length) currentIndex = 0;
  const item = words[currentIndex];

  progress.textContent = (currentIndex + 1) + " / " + words.length;

  const img = item.imageUrl
    ? `<div class="word-img-wrap"><img class="word-img" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.word)}" onerror="this.style.display='none'"></div>`
    : `<div class="word-img-wrap"><div class="small">이미지 주소 없음</div></div>`;

  box.innerHTML = `
    ${img}
    <div class="word">${escapeHtml(item.word)}</div>
    <div class="example">${highlight(item.sentence, item.word)}</div>
    <div class="meaning">${escapeHtml(item.meaning)}</div>
  `;
}

function nextCard(){
  if(!words.length) return;
  currentIndex = (currentIndex + 1) % words.length;
  renderLearn();
}

function prevCard(){
  if(!words.length) return;
  currentIndex = (currentIndex - 1 + words.length) % words.length;
  renderLearn();
}

function renderAllList(){
  const list = document.getElementById("allList");

  if(!words.length){
    list.innerHTML = "아직 반영된 단어가 없습니다.";
    return;
  }

  list.innerHTML = words.map((item, idx) => {
    const img = item.imageUrl
      ? `<img class="list-img" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.word)}" onerror="this.style.display='none'">`
      : `<div class="list-img small" style="display:flex;align-items:center;justify-content:center;">no image</div>`;

    return `
      <div class="card">
        <div class="item-row">
          ${img}
          <div>
            <div class="word"><span class="numcirc">${idx + 1}.</span>${escapeHtml(item.word)}</div>
            <div class="example">${highlight(item.sentence, item.word)}</div>
            <div class="meaning">${escapeHtml(item.meaning)}</div>
            ${item.imageUrl ? `<div class="url">${escapeHtml(item.imageUrl)}</div>` : ""}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function makeQuiz(){
  const box = document.getElementById("quizBox");

  if(words.length < 4){
    box.innerHTML = "단어를 4개 이상 입력하면 문제가 나옵니다.";
    return;
  }

  const answer = words[Math.floor(Math.random() * words.length)];
  const pool = words.filter(w => w.word !== answer.word);
  const choices = [answer];

  while(choices.length < 4 && pool.length){
    const pick = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
    choices.push(pick);
  }

  choices.sort(() => Math.random() - 0.5);
  currentQuiz = { answer, choices };

  box.innerHTML = `
    <div class="meaning">${escapeHtml(answer.meaning)}</div>
    ${answer.imageUrl ? `<div class="word-img-wrap"><img class="word-img" src="${escapeHtml(answer.imageUrl)}" onerror="this.style.display='none'"></div>` : ""}
    <div>
      ${choices.map(c => `<button class="choice" onclick="checkQuiz('${escapeHtml(c.word)}')">${escapeHtml(c.word)}</button>`).join("")}
    </div>
    <div id="quizResult" style="margin-top:10px;"></div>
  `;
}

function checkQuiz(chosen){
  if(!currentQuiz) return;
  const result = document.getElementById("quizResult");
  const buttons = document.querySelectorAll("#quizBox .choice");
  const answerWord = currentQuiz.answer.word;

  buttons.forEach(btn => {
    if(btn.textContent === answerWord) btn.classList.add("correctChoice");
    if(btn.textContent === chosen && chosen !== answerWord) btn.classList.add("wrongChoice");
    btn.disabled = true;
  });

  if(chosen === answerWord){
    result.innerHTML = `<span class="correct">맞았어요.</span>`;
  }else{
    result.innerHTML = `<span class="wrong">틀렸어요. 정답은 ${escapeHtml(answerWord)} 입니다.</span>`;
    addWrong(currentQuiz.answer);
  }
}

function addWrong(item){
  if(!wrongWords.some(w => w.word === item.word)){
    wrongWords.push(item);
    saveWrong();
    renderWrong();
  }
}

function renderWrong(){
  const box = document.getElementById("wrongList");

  if(!wrongWords.length){
    box.innerHTML = "아직 오답이 없습니다.";
    return;
  }

  box.innerHTML = wrongWords.map((item, idx) => `
    <div class="card">
      <div class="word">${idx + 1}. ${escapeHtml(item.word)}</div>
      <div class="example">${highlight(item.sentence, item.word)}</div>
      <div class="meaning">${escapeHtml(item.meaning)}</div>
    </div>
  `).join("");
}

function clearWrong(){
  wrongWords = [];
  saveWrong();
  renderWrong();
}

function renderUse(){
  const box = document.getElementById("useBox");

  if(!words.length){
    box.innerHTML = "단어를 먼저 입력하세요.";
    return;
  }

  box.innerHTML = words.map((item, idx) => `
    <div class="card">
      <div class="meaning">${idx + 1}. ${escapeHtml(item.meaning)}</div>
      <div class="example">${escapeHtml(item.sentence).replace(new RegExp(escapeHtml(item.word), "gi"), "_____")}</div>
      <input placeholder="단어를 써 보세요" oninput="checkUse(this, '${escapeHtml(item.word)}')">
      <div class="small"></div>
    </div>
  `).join("");
}

function checkUse(input, answer){
  const msg = input.nextElementSibling;
  if(input.value.trim().toLowerCase() === answer.toLowerCase()){
    msg.innerHTML = `<span class="correct">맞았어요.</span>`;
  }else{
    msg.innerHTML = "";
  }
}

function renderAll(){
  renderLearn();
  renderAllList();
  renderWrong();
  renderUse();
}

function openTab(name){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

  document.querySelector(`.tab[data-tab="${name}"]`)?.classList.add("active");
  document.getElementById(name)?.classList.add("active");

  if(name === "quiz") makeQuiz();
  if(name === "use") renderUse();
  if(name === "wrong") renderWrong();
  if(name === "all") renderAllList();
}

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => openTab(btn.dataset.tab));
});

init();
</script>
</body>
</html>
